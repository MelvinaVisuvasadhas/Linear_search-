<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Linear Search Visualizer</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        text-align: center;
        padding: 50px;
    }

    h1 {
        margin-bottom: 20px;
    }

    input, button {
        padding: 10px;
        margin: 10px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
    }

    input {
        width: 250px;
    }

    button {
        background: #ff7eb3;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff4f81;
        transform: scale(1.1);
    }

    .container {
        margin-top: 30px;
    }

    .array-box {
        display: inline-block;
        padding: 15px;
        margin: 5px;
        background: rgba(255,255,255,0.2);
        border-radius: 10px;
        transition: 0.5s;
    }

    .active {
        background: yellow;
        color: black;
        transform: scale(1.2);
    }

    .found {
        background: limegreen;
        color: black;
    }

    #result {
        margin-top: 20px;
        font-size: 20px;
        font-weight: bold;
    }
</style>

</head>
<body>

<h1>🔍 Linear Search Visualizer</h1>

<input type="text" id="arrayInput" placeholder="Enter numbers (e.g. 10 20 30)">
<br>
<input type="number" id="keyInput" placeholder="Enter number to search">
<br>
<button onclick="startSearch()">Start Search</button>

<div class="container" id="arrayContainer"></div>

<div id="result"></div>

<script>
async function startSearch() {
    const arrInput = document.getElementById("arrayInput").value;
    const key = parseInt(document.getElementById("keyInput").value);

    let arr = arrInput.split(" ").map(Number);
    let container = document.getElementById("arrayContainer");
    let result = document.getElementById("result");

    container.innerHTML = "";
    result.innerHTML = "";

    // Create boxes
    arr.forEach(num => {
        let div = document.createElement("div");
        div.classList.add("array-box");
        div.innerText = num;
        container.appendChild(div);
    });

    let boxes = document.querySelectorAll(".array-box");

    for (let i = 0; i < arr.length; i++) {
        boxes[i].classList.add("active");

        await new Promise(r => setTimeout(r, 700));

        if (arr[i] === key) {
            boxes[i].classList.remove("active");
            boxes[i].classList.add("found");
            result.innerHTML = `✅ Element found at index: ${i}`;
            return;
        }

        boxes[i].classList.remove("active");
    }

    result.innerHTML = "❌ Element not found";
}
</script>

</body>
</html>
